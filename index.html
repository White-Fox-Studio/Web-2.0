    // ===================== ОБНОВЛЕННАЯ ФУНКЦИЯ sendToCRM =====================
    window.sendToCRM = async function () {

        // Получаем значения полей с отладкой
        const clientName = isMobile ?
            document.getElementById('mobile-clientName')?.value.trim() :
            document.getElementById('clientName')?.value.trim();

        const clientPhone = isMobile ?
            document.getElementById('mobile-clientPhone')?.value.trim() :
            document.getElementById('clientPhone')?.value.trim();

        const clientLine = isMobile ?
            document.getElementById('mobile-clientLine')?.value.trim() :
            document.getElementById('clientLine')?.value.trim();

        const studentFirstName = isMobile ?
            document.getElementById('mobile-studentFirstName')?.value.trim() :
            document.getElementById('studentFirstName')?.value.trim();

        const studentLastName = isMobile ?
            document.getElementById('mobile-studentLastName')?.value.trim() :
            document.getElementById('studentLastName')?.value.trim();

        const birthdateField = isMobile ?
            document.getElementById('mobile-birthdate') :
            document.getElementById('birthdate');

        const birthdateRaw = birthdateField?.value?.trim() || '';

        const classGrade = isMobile ?
            document.getElementById('mobile-classGrade')?.value.trim() :
            document.getElementById('classGrade')?.value.trim();

        const statusDiv = document.getElementById('crmStatus');
        if (!statusDiv) return;

        statusDiv.style.display = 'block';

        // ДОБАВЛЯЕМ ОТЛАДКУ
        console.log('=== SEND TO CRM ===');
        console.log('clientName:', clientName);
        console.log('clientPhone:', clientPhone);
        console.log('clientLine:', clientLine);
        console.log('studentFirstName:', studentFirstName);
        console.log('studentLastName:', studentLastName);
        console.log('birthdateRaw:', birthdateRaw);
        console.log('birthdateField value:', birthdateField?.value);
        console.log('classGrade:', classGrade);
        console.log('cart length:', cart.length);

        // Проверяем обязательные поля (включая Line ID и дату рождения)
        if (!clientName || !clientPhone || !clientLine || !studentFirstName || !studentLastName || !birthdateRaw || !classGrade) {
            console.log('Missing fields detected');
            statusDiv.className = 'status-message status-error';
            statusDiv.textContent = 'Please fill all required fields (including Line ID and Birthdate)';

            // Подсвечиваем незаполненные поля
            const fieldsToCheck = {
                clientName: isMobile ? 'mobile-clientName' : 'clientName',
                clientPhone: isMobile ? 'mobile-clientPhone' : 'clientPhone',
                clientLine: isMobile ? 'mobile-clientLine' : 'clientLine',
                studentFirstName: isMobile ? 'mobile-studentFirstName' : 'studentFirstName',
                studentLastName: isMobile ? 'mobile-studentLastName' : 'studentLastName',
                birthdate: isMobile ? 'mobile-birthdate' : 'birthdate',
                classGrade: isMobile ? 'mobile-classGrade' : 'classGrade'
            };

            for (const [key, id] of Object.entries(fieldsToCheck)) {
                const field = document.getElementById(id);
                if (field && (!field.value || field.value.trim() === '')) {
                    field.style.border = '2px solid #c44536';
                    field.style.backgroundColor = '#fff8f8';
                    field.addEventListener('input', function () {
                        this.style.border = '';
                        this.style.backgroundColor = '';
                    }, {once: true});
                }
            }

            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
            return;
        }

        // Проверяем формат даты (должно быть DD/MM/YYYY)
        const datePattern = /^(\d{2})\/(\d{2})\/(\d{4})$/;
        if (!datePattern.test(birthdateRaw)) {
            console.log('Invalid date format:', birthdateRaw);
            statusDiv.className = 'status-message status-error';
            statusDiv.textContent = 'Invalid birthdate format. Please use DD/MM/YYYY (enter only numbers)';

            const birthdateFieldElem = document.getElementById(isMobile ? 'mobile-birthdate' : 'birthdate');
            if (birthdateFieldElem) {
                birthdateFieldElem.style.border = '2px solid #c44536';
                birthdateFieldElem.style.backgroundColor = '#fff8f8';
                birthdateFieldElem.addEventListener('input', function () {
                    this.style.border = '';
                    this.style.backgroundColor = '';
                }, {once: true});
            }

            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
            return;
        }

        // Проверяем корректность даты
        const match = datePattern.exec(birthdateRaw);
        if (match) {
            const day = parseInt(match[1], 10);
            const month = parseInt(match[2], 10);
            const year = parseInt(match[3], 10);

            const date = new Date(year, month - 1, day);
            const isValidDate = date.getFullYear() === year &&
                date.getMonth() === month - 1 &&
                date.getDate() === day &&
                year >= 1900 &&
                year <= new Date().getFullYear();

            if (!isValidDate) {
                console.log('Invalid date values:', {day, month, year});
                statusDiv.className = 'status-message status-error';
                statusDiv.textContent = 'Invalid date. Please check day, month, and year';

                const birthdateFieldElem = document.getElementById(isMobile ? 'mobile-birthdate' : 'birthdate');
                if (birthdateFieldElem) {
                    birthdateFieldElem.style.border = '2px solid #c44536';
                    birthdateFieldElem.style.backgroundColor = '#fff8f8';
                }

                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 3000);
                return;
            }
        }

        if (cart.length === 0) {
            console.log('Cart is empty');
            statusDiv.className = 'status-message status-error';
            statusDiv.textContent = 'Cart is empty';
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
            return;
        }

        console.log('All validations passed, sending order...');
        statusDiv.className = 'status-message';
        statusDiv.textContent = 'Sending...';

        // Формируем данные для отправки
        const items = cart.map(item => ({
            sku: item.sku,
            quantity: item.quantity,
            isPackage: item.isPackage || false,
            price: item.price,
            bonus_type: item.bonus_type,
            bonus_value: item.bonus_value
        }));

        const orderData = {
            customer: {
                clientName: clientName,
                clientPhone: clientPhone,
                clientLine: clientLine || '',
                studentFirstName: studentFirstName,
                studentLastName: studentLastName,
                birthdate: birthdateRaw, // Уже в формате DD/MM/YYYY
                classGrade: classGrade
            },
            items: items
        };

        console.log('Sending order data:', orderData);

        try {
            const result = await sendOrderToBackend(orderData.customer, items, statusDiv)

            console.log('Response:', result);

            if (!result.success) {
                throw new Error(result.error || 'Failed to send order');
            }

            // Показываем информацию о скидке
            let successMessage = 'Order sent successfully!';
            if (result.payment_info && result.payment_info.discount_applied > 0) {
                successMessage = `Order sent! Discount: ${result.payment_info.discount_applied} THB. Total: ${result.payment_info.final_to_pay} THB`;
            }

            statusDiv.className = 'status-message status-success';
            statusDiv.textContent = successMessage;

            // Очищаем корзину
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
            renderCategories();
            closeMobileCart();

            // Очищаем форму
            if (isMobile) {
                const mobileClientName = document.getElementById('mobile-clientName');
                const mobileClientPhone = document.getElementById('mobile-clientPhone');
                const mobileClientLine = document.getElementById('mobile-clientLine');
                const mobileStudentFirstName = document.getElementById('mobile-studentFirstName');
                const mobileStudentLastName = document.getElementById('mobile-studentLastName');
                const mobileBirthdate = document.getElementById('mobile-birthdate');
                const mobileClassGrade = document.getElementById('mobile-classGrade');

                if (mobileClientName) mobileClientName.value = '';
                if (mobileClientPhone) mobileClientPhone.value = '';
                if (mobileClientLine) mobileClientLine.value = '';
                if (mobileStudentFirstName) mobileStudentFirstName.value = '';
                if (mobileStudentLastName) mobileStudentLastName.value = '';
                if (mobileBirthdate) mobileBirthdate.value = '';
                if (mobileClassGrade) mobileClassGrade.value = '';
            } else {
                const clientNameEl = document.getElementById('clientName');
                const clientPhoneEl = document.getElementById('clientPhone');
                const clientLineEl = document.getElementById('clientLine');
                const studentFirstNameEl = document.getElementById('studentFirstName');
                const studentLastNameEl = document.getElementById('studentLastName');
                const birthdateEl = document.getElementById('birthdate');
                const classGradeEl = document.getElementById('classGrade');

                if (clientNameEl) clientNameEl.value = '';
                if (clientPhoneEl) clientPhoneEl.value = '';
                if (clientLineEl) clientLineEl.value = '';
                if (studentFirstNameEl) studentFirstNameEl.value = '';
                if (studentLastNameEl) studentLastNameEl.value = '';
                if (birthdateEl) birthdateEl.value = '';
                if (classGradeEl) classGradeEl.value = '';
            }

            // Показываем тост с деталями заказа
            openSuccessOrder(result.order_number, result.payment_info.final_to_pay);

        } catch (error) {
            console.error('Error sending order:', error);
            statusDiv.className = 'status-message status-error';
            statusDiv.textContent = 'Error sending order: ' + (error.message || 'Unknown error');
            showToast('Failed to send order: ' + (error.message || 'Unknown error'), 'error');
        } finally {
            // Скрываем статус через 5 секунд
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }
    };

    // ===================== ИНИЦИАЛИЗАЦИЯ ПОЛЕЙ ДАТЫ =====================
    function initDateFields() {
        const desktopDate = document.getElementById('birthdate');
        const mobileDate = document.getElementById('mobile-birthdate');

        if (desktopDate) {
            formatDateInput(desktopDate);
        }

        if (mobileDate) {
            formatDateInput(mobileDate);
        }
    }

    // ===================== ЯЗЫК =====================
    document.getElementById('langToggle')?.addEventListener('click', function () {
        currentLang = currentLang === 'th' ? 'en' : 'th';
        document.getElementById('lang-icon').textContent = currentLang === 'th' ? '🇹🇭' : '🇬🇧';
        document.getElementById('lang-text').textContent = currentLang === 'th' ? 'TH' : 'EN';

        if (products.length > 0) {
            renderCategories();
        }
        if (cart.length > 0) {
            updateCartUI();
        }
    });

    // ===================== ИНИЦИАЛИЗАЦИЯ =====================
    document.addEventListener('DOMContentLoaded', function () {
        // initSupabase();
        loadData();
        document.getElementById('overlay')?.addEventListener('click', closeMobileCart);
        setupDateFields();
        setupInputRestrictions(); // Добавляем ограничения при вводе
        addFormHint(); // Добавляем подсказку
        resetStickyCartTop();
        // TODO временно
        updateCartUI();
    });

    // Добавляем кэширование изображений
    document.addEventListener('DOMContentLoaded', function () {
        const images = document.querySelectorAll('img');
        images.forEach(img => {
            img.loading = 'lazy';
            img.decoding = 'async';
        });
    });

    window.addEventListener('resize', function() {
        resetStickyCartTop();
    });

    window.addEventListener('scroll', function() {
        if (!scrolled && window.scrollY > 0) {
            scrolled = true;
            setTimeout(()=>{
                topBar.classList.add('scrolled');
                mobileNav.classList.add('scrolled');
            }, 1)
        }
        if (scrolled && window.scrollY <= 0) {
            scrolled = false;
            setTimeout(()=>{
                topBar.classList.remove('scrolled');
                mobileNav.classList.remove('scrolled');
            }, 1)
        }
    })
</script>
