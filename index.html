    <style>
        /* Критический CSS для быстрого отображения */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-nav: #ffffff;
            --bg-button: #f1f5f9;
            --bg-cart: #ffffff;
            --bg-form: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --text-muted: #546e7a;
            --border-color: #e9eef2;
            --border-dark: #d1d9e2;
            --accent-primary: #007883;
            --accent-hover: #0a6570;
            --accent-light: #d9f0f2;
            --shadow-color: rgba(0, 120, 131, 0.2);
            --price-color: #007883;
            --in-cart-bg: #e0f2f5;
            --in-cart-text: #007883;
            --success-bg: #e3f7e3;
            --success-text: #2e7d5e;
            --error-bg: #ffe8e5;
            --error-text: #c44536;
            --red-warning: #d32f2f;
            --modal-overlay: rgba(0, 0, 0, 0.5);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.4;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Минимальные стили для быстрого отображения */
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading-spinner.active {
            display: block;
        }

        /* Остальные стили будут загружены после */
    </style>

    <!-- Preload критических ресурсов -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" as="script">
</head>

<!-- Контейнер для остальных стилей (загружаются асинхронно) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" media="print"
      onload="this.media='all'">

<!-- Supabase Client Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

<script>
    // ===================== КОНСТАНТЫ ==============================
    const topBar = document.getElementById('topBar');
    const pcNav = document.getElementById('pcCategoryNav');
    const mobileNav = document.getElementById('mobileCategoryNav');
    let isMobile = window.innerWidth <= 900;
    let scrolled = false;
    // ===================== КЭШИРОВАНИЕ ДАННЫХ =====================
    const CACHE_KEYS = {
        CONFIG: 'supabase_config_cache',
        PRODUCTS: 'products_cache',
        CATEGORIES: 'categories_cache',
        TIMESTAMP: 'last_fetch_timestamp'
    };

    const CACHE_DURATION = 5 * 60 * 1000; // 5 минут
    let isInitialized = false;
    let dataLoadPromise = null;

    // ===================== ИНИЦИАЛИЗАЦИЯ =====================
    let categories = [];
    let products = [];
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    console.log(cart);
    let currentLang = 'th';

    // ===================== LOAD DATA  ============================
    async function sendOrderToBackend(customerData, cartItems) {
        try {
            const response = await fetch('/api/order', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    customer: customerData,
                    items: cartItems
                })
            });

            const result = await response.json();
            console.log(result, result.success);
            return result;
        } catch (error) {
            throw new Error(error)
        }
    }

    function prepareData(categoriesData, productCardsData, packagesData) {
        // ===================== ЗАГРУЗКА КАТЕГОРИЙ =====================
        categories = (categoriesData || []).sort((a, b) => {
            const orderA = a.sort_order !== null && a.sort_order !== undefined ? a.sort_order : 999;
            const orderB = b.sort_order !== null && b.sort_order !== undefined ? b.sort_order : 999;
            return orderA - orderB;
        });

        console.log(`Loaded ${categories.length} categories:`, categories.map(c => ({id: c.id, name: c.name})));

        // ===================== ЗАГРУЗКА ТОВАРОВ ИЗ VIEW product_cards =====================

        console.log(`Loaded ${productCardsData?.length || 0} product cards`);

        // ===================== ЗАГРУЗКА ПАКЕТОВ =====================
        console.log(`Loaded ${packagesData?.length || 0} packages`);

        // ===================== НАХОДИМ ID КАТЕГОРИИ PACKAGE =====================
        let packageCategoryId = null;
        const packageCategory = categories.find(c => {
            const name = (c.name || '').toUpperCase();
            return name === 'PACKAGE' || name === 'PACKAGES';
        });

        if (packageCategory) {
            packageCategoryId = packageCategory.id;
            console.log('✅ Found package category:', packageCategory.name, 'ID:', packageCategoryId);
        } else {
            console.warn('⚠️ Package category not found');
            packageCategoryId = null;
        }

        // ===================== ОБРАБОТКА ТОВАРОВ (СОХРАНЯЕМ КАРТОЧКИ ЦЕЛИКОМ) =====================
        // ===================== ОБРАБОТКА ТОВАРОВ (СОХРАНЯЕМ КАРТОЧКИ ЦЕЛИКОМ) =====================
        let processedProducts = [];

        if (productCardsData && productCardsData.length > 0) {
            productCardsData.forEach(card => {
                // Парсим variants
                let variants = [];
                try {
                    if (card.variants) {
                        if (typeof card.variants === 'string') {
                            variants = JSON.parse(card.variants);
                        } else {
                            variants = card.variants;
                        }
                    }
                } catch (e) {
                    console.warn(`Error parsing variants for card:`, e);
                }

                // Определяем category_id
                let categoryId = card.category_id;
                if (categoryId) {
                    const exists = categories.find(c => String(c.id) === String(categoryId));
                    if (!exists) {
                        categoryId = null;
                    }
                }

                // Находим минимальную цену среди вариантов
                let minPrice = null;
                if (variants.length > 0) {
                    const prices = variants.map(v => v.price || 0);
                    minPrice = Math.min(...prices);
                }

                // ИСПРАВЛЕНИЕ: берем SKU из первого варианта, если нет card.sku
                let cardSku = card.sku;
                if (!cardSku && variants.length > 0) {
                    cardSku = variants[0].sku;
                }
                if (!cardSku) {
                    cardSku = card.card_id || `card_${Date.now()}`;
                }

                processedProducts.push({
                    id: card.card_id || `card_${cardSku}`,
                    sku: cardSku, // ИСПРАВЛЕНО: теперь SKU берется из первого варианта
                    name_en: card.name_en,
                    name_th: card.name_th,
                    description_en: card.descriptions || card.description_en || '',
                    description_th: card.descriptions_th || card.description_th || '',
                    base_price: minPrice || card.price || 0,
                    image_url: card.cover_image || null,
                    image: card.cover_image || null,
                    category_id: categoryId,
                    isPackage: false,
                    variants: variants,
                    sort_product: card.sort_product !== undefined ? card.sort_product : 999
                });
            });
        }

        // ===================== ОБРАБОТКА ПАКЕТОВ =====================
        if (packagesData && packagesData.length > 0) {
            console.log(`Processing ${packagesData.length} packages`);

            packagesData.forEach(pkg => {
                if (pkg.visible === false) return;

                const packageSku = pkg.sku || pkg.slug || `package-${Date.now()}`;

                let packageItems = [];
                let totalPhotos = pkg.total_photos || 0;

                try {
                    if (pkg.contents) {
                        if (typeof pkg.contents === 'string') {
                            packageItems = JSON.parse(pkg.contents);
                        } else {
                            packageItems = pkg.contents;
                        }
                    }
                } catch (e) {
                    console.warn(`Error parsing contents for package ${packageSku}:`, e);
                }

                const placeholderImage = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'%3E%3Crect width='300' height='300' fill='%23f0f0f0'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dy='.3em' fill='%23999' font-size='20'%3E${packageSku}%3C/text%3E%3C/svg%3E`;

                const packageProduct = {
                    id: `package_${packageSku}`,
                    sku: packageSku,
                    name_en: pkg.name_en || packageSku,
                    name_th: pkg.name_th || pkg.name_en || packageSku,
                    description_en: pkg.description_en || '',
                    description_th: pkg.description_th || '',
                    price: pkg.price || 0,
                    old_price: pkg.discount_percent ? Math.round(pkg.price / (1 - pkg.discount_percent / 100)) : null,
                    image_url: pkg.image_url || placeholderImage,
                    image: pkg.image_url || placeholderImage,
                    category_id: packageCategoryId,
                    isPackage: true,
                    packageItems: packageItems,
                    totalPhotos: totalPhotos,
                    qty: packageItems.map(item => `${item.qty || 1} × ${item.name_en || item.sku}`).join('\n'),
                    bonus_type: pkg.bonus_type,
                    bonus_value: pkg.bonus_value,
                    discount_percent: pkg.discount_percent,
                    visible: pkg.visible,
                    sort_order: pkg.sort_order || 999,
                    sort_product: pkg.sort_order || 999
                };

                console.log(`📦 Package added: ${packageSku}`);
                processedProducts.push(packageProduct);
            });
        }

        // ===================== СОРТИРОВКА =====================
        processedProducts.sort((a, b) => {
            const sortA = a.sort_product || 999;
            const sortB = b.sort_product || 999;

            if (sortA !== sortB) {
                return sortA - sortB;
            }
            return (a.sku || '').localeCompare(b.sku || '');
        });

        products = processedProducts;
    }

    async function loadData() {

        try {
                const response = await fetch('/api/catalog');

                if (!response.ok) throw new Error('Ошибка загрузки каталога');

                const data = await response.json();

                prepareData(data.categories, data.products, data.packages)

                renderCategories();
                updateCategoryNav();
                updateCartUI();
            } catch (error) {
                console.error(error);
                document.getElementById('categories-container').innerHTML = `
                    <div class="empty-category">
                        Error loading products: ${error.message || 'Unknown error'}<br>
                        <button onclick="location.reload()" style="margin-top:1rem; padding:0.5rem 2rem;">Reload</button>
                    </div>
                `;
            }
    }

    // ===================== ФУНКЦИИ НАВИГАЦИИ =====================
    function resetNavigation() {
        if (pcNav) {
            while (pcNav.firstChild) {
                pcNav.removeChild(pcNav.firstChild);
            }
            pcNav.style.display = 'none';
        }

        if (mobileNav) {
            while (mobileNav.firstChild) {
                mobileNav.removeChild(mobileNav.firstChild);
            }
            mobileNav.style.display = 'none';
        }
    }

    function updateCategoryNav() {
        if (!pcNav || !mobileNav) return;

        resetNavigation();

        if (!categories || categories.length === 0 || !products || products.length === 0) {
            return;
        }

        // Находим уникальные категории с продуктами
        const categoryMap = new Map();

        // Добавляем все категории из БД
        categories.forEach(category => {
            categoryMap.set(category.id, category);
        });

        // Проверяем, есть ли пакеты в products
        const hasPackages = products.some(p => p.isPackage);

        // Если есть пакеты, добавляем категорию PACKAGES в карту
        if (hasPackages) {
            categoryMap.set('packages', {
                id: 'packages',
                name: 'PACKAGES',
                slug: 'packages',
                sort_order: 0
            });
        }

        // Удаляем категории без товаров
        for (let [catId, category] of categoryMap) {
            let hasProducts = false;

            if (catId === 'packages') {
                hasProducts = hasPackages;
            } else {
                hasProducts = products.some(p => !p.isPackage && p.category_id === catId);
            }

            if (!hasProducts) {
                categoryMap.delete(catId);
            }
        }

        const categoriesWithProducts = Array.from(categoryMap.values());

        if (categoriesWithProducts.length === 0) {
            pcNav.style.display = 'none';
            mobileNav.style.display = 'none';
            return;
        }

        // Сортируем
        categoriesWithProducts.sort((a, b) => {
            const orderA = a.sort_order !== undefined ? a.sort_order : 999;
            const orderB = b.sort_order !== undefined ? b.sort_order : 999;
            return orderA - orderB;
        });

        pcNav.style.display = 'flex';
        mobileNav.style.display = 'flex';

        // Создаем кнопки для ПК
        categoriesWithProducts.forEach(cat => {
            const slug = cat.slug || `cat-${cat.id}`;

            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.textContent = cat.name || 'Category';
            btn.onclick = (e) => {
                e.preventDefault();
                const element = document.getElementById(`cat-${slug}`);
                if (element) {
                    element.scrollIntoView({behavior: 'smooth'});
                }
            };
            pcNav.appendChild(btn);
        });

        // Создаем ссылки для мобильной версии
        categoriesWithProducts.forEach(cat => {
            const slug = cat.slug || `cat-${cat.id}`;

            const link = document.createElement('a');
            link.href = `#cat-${slug}`;
            link.className = 'cat-link';
            link.textContent = cat.name || 'Category';
            link.onclick = (e) => {
                e.preventDefault();
                const element = document.getElementById(`cat-${slug}`);
                if (element) {
                    element.scrollIntoView({behavior: 'smooth'});
                    closeMobileCart();
                }
            };
            mobileNav.appendChild(link);
        });
    }

    // ===================== ФУНКЦИИ РЕНДЕРИНГА =====================
    function renderCategories() {
        const container = document.getElementById('categories-container');
        if (!container) return;

        container.innerHTML = '';

        // Проверяем наличие данных
        if (!products || products.length === 0) {
            container.innerHTML = '<div class="empty-category">No products available</div>';
            return;
        }

        if (!categories || categories.length === 0) {
            // Если нет категорий, показываем все продукты в одной категории
            const section = document.createElement('section');
            section.className = 'category';
            section.id = 'cat-all';

            section.innerHTML = `
            <div class="category-header">
                <span class="category-title">ALL PRODUCTS</span>
                <span class="product-count">${products.length} items</span>
            </div>
            <div class="product-grid" id="grid-all"></div>
        `;

            container.appendChild(section);

            const grid = document.getElementById('grid-all');
            renderProducts(grid, products);
            return;
        }

        // Группируем продукты по категориям
        const productsByCategory = {};

        // 1. Инициализируем все категории из БД
        categories.forEach(category => {
            if (category && category.id) {
                productsByCategory[category.id] = {
                    category: category,
                    products: []
                };
            }
        });

        // 2. Добавляем специальные категории
        productsByCategory['packages'] = {
            category: {
                id: 'packages',
                name: 'PACKAGES',
                slug: 'packages',
                sort_order: 1
            },
            products: []
        };

        productsByCategory['uncategorized'] = {
            category: {
                id: 'uncategorized',
                name: 'Other',
                slug: 'other',
                sort_order: 999
            },
            products: []
        };

        // 3. Распределяем продукты по категориям
        products.forEach(product => {
            // Проверяем, является ли продукт пакетом
            if (product.isPackage) {
                // Пакеты всегда идут в категорию PACKAGES
                productsByCategory['packages'].products.push(product);
                return;
            }

            // Для обычных продуктов - проверяем category_id
            const categoryId = product.category_id;

            if (categoryId && productsByCategory[categoryId]) {
                // Категория найдена в БД
                productsByCategory[categoryId].products.push(product);
            } else {
                // Категория не найдена - в Other
                productsByCategory['uncategorized'].products.push(product);
            }
        });

        // 4. Удаляем пустые категории
        for (let catId in productsByCategory) {
            if (productsByCategory[catId].products.length === 0) {
                delete productsByCategory[catId];
            }
        }

        // 5. Сортируем категории по sort_order
        const sortedCategories = Object.values(productsByCategory).sort((a, b) => {
            const orderA = a.category.sort_order !== undefined ? a.category.sort_order : 999;
            const orderB = b.category.sort_order !== undefined ? b.category.sort_order : 999;
            return orderA - orderB;
        });

        console.log('Rendering categories:', sortedCategories.map(c => ({
            name: c.category.name,
            count: c.products.length,
            order: c.category.sort_order
        })));

        // 6. Рендерим каждую категорию
        sortedCategories.forEach(group => {
            const category = group.category;
            const categorySlug = category.slug || `cat-${category.id}`;
            const categoryName = category.name || 'Category';
            const productCount = group.products.length;

            const section = document.createElement('section');
            section.id = `cat-${categorySlug}`;
            section.className = 'category';

            section.innerHTML = `
            <div class="category-header">
                <span class="category-title">${categoryName.toUpperCase()}</span>

            </div>
            <div class="product-grid" id="grid-${categorySlug}"></div>
        `;

            container.appendChild(section);

            const grid = document.getElementById(`grid-${categorySlug}`);

            // Сортируем продукты внутри категории по sort_product
            const sortedProducts = [...group.products].sort((a, b) => {
                const sortA = a.sort_product !== undefined ? a.sort_product : 999;
                const sortB = b.sort_product !== undefined ? b.sort_product : 999;

                if (sortA !== sortB) {
                    return sortA - sortB;
                }
                return (a.sku || '').localeCompare(b.sku || '');
            });

            renderProducts(grid, sortedProducts);
        });

        // 7. Если после всего нет категорий, показываем сообщение
        if (sortedCategories.length === 0) {
            container.innerHTML = '<div class="empty-category">No products available</div>';
        }
    }

    function renderProducts(grid, productsList) {
        if (!grid) return;

        if (!productsList || productsList.length === 0) {
            grid.innerHTML = '<div class="empty-category">No products in this category</div>';
            return;
        }

        const sortedProducts = [...productsList].sort((a, b) => {
            const sortA = a.sort_product !== undefined ? a.sort_product : 0;
            const sortB = b.sort_product !== undefined ? b.sort_product : 0;
            if (sortA !== 0 && sortB !== 0) return sortA - sortB;
            if (sortA === 0 && sortB !== 0) return 1;
            if (sortA !== 0 && sortB === 0) return -1;
            return (a.sku || '').localeCompare(b.sku || '');
        });

        let html = '';

        sortedProducts.forEach(prod => {
            const displayName = currentLang === 'th' ? (prod.name_th || prod.name || prod.sku) : (prod.name_en || prod.name || prod.sku);

            let specsHtml = '';

            // ========== ДЛЯ ПАКЕТОВ ==========
            if (prod.isPackage) {
                if (prod.totalPhotos > 0) {
                    specsHtml += `
                    <div class="info-badge">
                        ${prod.totalPhotos} photos included
                    </div>
                `;
                }

                if (prod.packageItems && prod.packageItems.length > 0) {
                    specsHtml += `<div class="package-items">`;
                    prod.packageItems.forEach(item => {
                        const itemName = currentLang === 'th' ? (item.name_th || item.sku) : (item.name_en || item.sku);
                        specsHtml += `<div class="package-item">${item.qty} × ${itemName}</div>`;
                    });
                    specsHtml += `</div>`;
                }
            }

            // ========== ДЛЯ ОБЫЧНЫХ ТОВАРОВ ==========
            if (!prod.isPackage && prod.variants && prod.variants.length > 0) {
                // Собираем уникальные значения
                const uniqueSizes = [...new Set(prod.variants.map(v => v.size_label).filter(Boolean))];
                const uniquePoses = [...new Set(prod.variants.map(v => v.pose).filter(Boolean))];
                const uniqueColors = [...new Set(prod.variants.map(v => v.color).filter(Boolean))];

                // Добавляем характеристики
                if (uniqueSizes.length > 0 || uniquePoses.length > 0 || uniqueColors.length > 0) {
                    specsHtml += `<div class="product-specs-info">`;

                    if (uniqueSizes.length > 0) {
                        specsHtml += `
                        <div class="spec-info-item">
                            <span class="spec-label">Size:</span>
                            <span class="spec-value">${uniqueSizes.join(', ')}</span>
                        </div>
                    `;
                    }

                    if (uniquePoses.length > 0) {
                        specsHtml += `
                        <div class="spec-info-item">
                            <span class="spec-label">Pose:</span>
                            <span class="spec-value">${uniquePoses.join(', ')}</span>
                        </div>
                    `;
                    }

                    if (uniqueColors.length > 0) {
                        specsHtml += `
                        <div class="spec-info-item">
                            <span class="spec-label">Color:</span>
                            <span class="spec-value">${uniqueColors.join(', ')}</span>
                        </div>
                    `;
                    }

                    specsHtml += `</div>`;
                }
            }

            // ========== ВАРИАНТЫ ТОВАРА ==========
            let variantsSelectorHtml = '';
            let currentPrice = prod.base_price || prod.price || 0;
            let currentSku = prod.sku;
            let currentDescription = '';
            let currentImage = prod.image_url || '';

            if (!prod.isPackage && prod.variants && prod.variants.length > 0) {
                // Находим данные для первого варианта
                const firstVariant = prod.variants[0];
                if (firstVariant) {
                    currentPrice = firstVariant.price;
                    if (firstVariant.sku) currentSku = firstVariant.sku;
                    currentDescription = currentLang === 'th' ? (firstVariant.descriptions_th || '') : (firstVariant.descriptions || '');
                    currentImage = firstVariant.image_url || prod.image_url || '';
                }

                // Показываем селект ТОЛЬКО если больше 1 варианта
                if (prod.variants.length > 1) {
                    variantsSelectorHtml = `
                    <div class="variant-selector-wrapper">
                        <select class="variant-selector" id="variant-select-${prod.id}"
                                onchange="updateCardData('${prod.id}')">
                            ${prod.variants.map((v, idx) => {
                        let variantText = '';
                        let variantParts = [];
                        if (v.size_label) variantParts.push(v.size_label);
                        if (v.pose) variantParts.push(v.pose);
                        if (v.color) variantParts.push(v.color);
                        variantText = variantParts.join(' / ');
                        if (!variantText) variantText = v.sku;

                        const variantImage = v.image_url || prod.image_url || '';

                        return `<option value="${v.sku}"
                                        data-price="${v.price}"
                                        data-description="${currentLang === 'th' ? (v.descriptions_th || '') : (v.descriptions || '')}"
                                        data-image="${variantImage}"
                                        ${idx === 0 ? 'selected' : ''}>
                                    ${variantText} — ฿${v.price}
                                </option>`;
                    }).join('')}
                        </select>
                    </div>
                `;
                }
                // Если 1 вариант - селект не показываем, данные уже установлены из firstVariant
            }

            // Description
            let descriptionText = '';
            if (prod.isPackage) {
                descriptionText = currentLang === 'th' ? prod.description_th || '' : prod.description_en || '';
            } else {
                descriptionText = currentDescription || (currentLang === 'th' ? prod.description_th || '' : prod.description_en || '');
            }

            let descHtml = '';
            if (descriptionText) {
                descHtml = `<div class="package-description" id="desc-${prod.id}">${descriptionText.replace(/\n/g, '<br>')}</div>`;
            }

            let priceHtml = `<span class="price" id="price-${prod.id}">฿${currentPrice}</span>`;
            let btnHtml = `<button class="add-to-cart-btn" onclick="addToCart('${prod.id}')">+</button>`;

            html += `<div class="product-card ${prod.isPackage ? 'package-card' : ''}" id="card-${prod.id}">
            <div class="product-image" onclick="window.open('${currentImage || prod.image_url}', '_blank')">
                <img id="img-${prod.id}"
                     src="${currentImage || prod.image_url}"
                     alt="${prod.sku}"
                     loading="lazy">
            </div>
            <div class="product-header">
                <span class="product-sku" id="sku-${prod.id}">${currentSku}</span>
                <span class="product-title">${displayName}</span>
            </div>
            ${specsHtml}
            ${descHtml}
            ${variantsSelectorHtml}
            <div class="price-area">
                <div class="price-wrapper">${priceHtml}</div>
                ${btnHtml}
            </div>
        </div>`;
        });

        grid.innerHTML = html;
    }

    // Обновленная функция обновления данных при выборе варианта
    window.updateCardData = function (cardId) {
        const selectEl = document.getElementById(`variant-select-${cardId}`);
        if (!selectEl) return;

        const selectedOption = selectEl.options[selectEl.selectedIndex];
        const price = selectedOption.getAttribute('data-price');
        const description = selectedOption.getAttribute('data-description');
        const imageUrl = selectedOption.getAttribute('data-image');
        const selectedSku = selectEl.value; // Получаем SKU из value option

        // Обновляем цену
        const priceEl = document.getElementById(`price-${cardId}`);
        if (priceEl && price) {
            priceEl.textContent = `฿${price}`;
        }

        // Обновляем SKU
        const skuEl = document.getElementById(`sku-${cardId}`);
        if (skuEl && selectedSku) {
            skuEl.textContent = selectedSku;
        }

        // Обновляем описание
        const descEl = document.getElementById(`desc-${cardId}`);
        if (descEl && description) {
            descEl.innerHTML = description.replace(/\n/g, '<br>');
        }

        // Обновляем изображение
        const imgEl = document.getElementById(`img-${cardId}`);
        if (imgEl && imageUrl) {
            imgEl.src = imageUrl;
            const parentDiv = imgEl.closest('.product-image');
            if (parentDiv) {
                parentDiv.setAttribute('onclick', `window.open('${imageUrl}', '_blank')`);
            }
        }
    };

    // ===================== ФУНКЦИИ ПОИСКА =====================
    window.searchProduct = function () {
        const searchInput = document.getElementById('searchInput');
        if (!searchInput) return;

        const searchTerm = searchInput.value.toLowerCase().trim();

        document.activeElement.blur();

        if (!searchTerm) {
            showToast('Please enter a search term', 'error');
            return;
        }

        const productCards = document.querySelectorAll('.product-card');

        if (productCards.length === 0) {
            showToast('No products on page', 'error');
            return;
        }

        let found = false;
        let firstMatch = null;
        let matchCount = 0;
        let matchedCardId = null;
        let matchedVariantSku = null;

        // Сначала очищаем подсветку
        productCards.forEach(card => {
            card.style.boxShadow = '';
            card.style.border = '';
        });

        // Ищем совпадения по SKU и названию
        productCards.forEach((card) => {
            const skuElement = card.querySelector('.product-sku');
            const titleElement = card.querySelector('.product-title');
            const selectElement = card.querySelector('.variant-selector');

            const cardSku = skuElement ? skuElement.textContent.toLowerCase() : '';
            const title = titleElement ? titleElement.textContent.toLowerCase() : '';

            // Проверяем SKU карточки
            if (cardSku.includes(searchTerm) || title.includes(searchTerm)) {
                if (!firstMatch) {
                    firstMatch = card;
                    matchedCardId = card.id.replace('card-', '');
                }
                matchCount++;
                found = true;

                // Подсвечиваем
                card.style.transition = 'box-shadow 0.3s';
                card.style.boxShadow = '0 0 0 3px var(--accent-primary)';
                card.style.border = '2px solid var(--accent-primary)';
            }

            // Если есть селект, проверяем варианты
            if (selectElement) {
                const options = selectElement.options;
                for (let i = 0; i < options.length; i++) {
                    const optionText = options[i].text.toLowerCase();
                    const optionValue = options[i].value.toLowerCase();

                    if (optionText.includes(searchTerm) || optionValue.includes(searchTerm)) {
                        if (!firstMatch) {
                            firstMatch = card;
                            matchedCardId = card.id.replace('card-', '');
                            matchedVariantSku = options[i].value;
                        }
                        matchCount++;
                        found = true;

                        // Подсвечиваем карточку
                        card.style.transition = 'box-shadow 0.3s';
                        card.style.boxShadow = '0 0 0 3px var(--accent-primary)';
                        card.style.border = '2px solid var(--accent-primary)';

                        // Если нашли вариант, выбираем его
                        if (matchedVariantSku && matchedCardId === card.id.replace('card-', '')) {
                            selectElement.value = matchedVariantSku;
                            // Вызываем обновление карточки
                            if (typeof updateCardData === 'function') {
                                updateCardData(matchedCardId);
                            }
                        }
                        break;
                    }
                }
            }
        });

        if (found && firstMatch) {

            const rect = firstMatch.getBoundingClientRect();
            const nav = isMobile ? document.getElementById('mobileCategoryNav') : document.getElementById('pcCategoryNav');
            const navRect = nav.getBoundingClientRect();
            const topOffset = navRect.top + navRect.height + 20;
            const targetPosition = rect.top + window.scrollY - topOffset;

            // Прокручиваем к найденной карточке
            window.scrollTo({
                top: Math.max(0, targetPosition),
                behavior: 'smooth'
            });

            showToast(`Found ${matchCount} product(s)`, 'success');

            // Убираем подсветку через 3 секунды
            setTimeout(() => {
                productCards.forEach(card => {
                    card.style.boxShadow = '';
                    card.style.border = '';
                });
            }, 3000);

        } else if (!found) {
            showToast('Product not found', 'error');
        }
    };

    // ===================== ФУНКЦИИ КОРЗИНЫ =====================
    function getCartQuantity(productId) {
        const item = cart.find(i => i.id === productId);
        return item ? item.quantity : 0;
    }

    // ===================== ФУНКЦИЯ ИЗМЕНЕНИЯ КОЛИЧЕСТВА В КОРЗИНЕ =====================
    window.updateQuantity = function (itemId, delta) {
        const itemIndex = cart.findIndex(item => item.id === itemId);

        if (itemIndex === -1) {
            console.warn('Item not found in cart:', itemId);
            return;
        }

        const item = cart[itemIndex];
        const newQuantity = item.quantity + delta;

        if (newQuantity <= 0) {
            cart.splice(itemIndex, 1);
            showToast(`Removed: ${item.name}`, 'info');
        } else {
            item.quantity = newQuantity;
        }

        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();

        if (cart.length === 0) {
            closeMobileCart();
        }
    };

    window.addToCart = function (cardId) {
        const prod = products.find(p => p.id === cardId);
        console.log("Adding cart", cardId, products, prod);
        if (!prod) return;

        let itemToAdd = null;

        if (prod.isPackage) {
            // Проверяем, является ли пакет "Package L"
            const isPackageL = (prod.sku && (prod.sku.toLowerCase() === 'package-l' || prod.sku.toLowerCase() === 'l')) ||
                (prod.name_en && prod.name_en.toLowerCase().includes('package l')) ||
                (prod.name_th && prod.name_th.toLowerCase().includes('package l'));

            itemToAdd = {
                id: prod.id,
                sku: prod.sku,
                name_th: prod.name_th || prod.name,
                name_en: prod.name_en || prod.name,
                price: prod.price,
                quantity: 1,
                isPackage: true,
                isPackageL: isPackageL,  // ДОБАВЛЕНО
                bonus_type: prod.bonus_type,
                bonus_value: prod.bonus_value,
                discount_percent: prod.discount_percent
            };
        } else {
            // ... остальной код для обычных товаров (без изменений) ...
            if (prod.variants && prod.variants.length > 0) {
                const selectEl = document.getElementById(`variant-select-${cardId}`);
                if (selectEl) {
                    const selectedSku = selectEl.value;
                    const selectedVariant = prod.variants.find(v => v.sku === selectedSku);
                    if (selectedVariant) {
                        let variantName = '';
                        if (selectedVariant.size_label) variantName += `${selectedVariant.size_label} `;
                        // if (selectedVariant.pose) variantName += `${selectedVariant.pose} `;
                        // if (selectedVariant.color) variantName += `${selectedVariant.color}`;
                        if (!variantName) variantName = selectedVariant.sku;

                        itemToAdd = {
                            id: selectedVariant.sku,
                            sku: selectedVariant.sku,
                            name_th: `${prod.name_th || prod.name} (${variantName.trim()})`,
                            name_en: `${prod.name_en || prod.name} (${variantName.trim()})`,
                            price: selectedVariant.price,
                            quantity: 1,
                            isPackage: false,
                            isPackageL: false
                        };
                    }
                } else {
                    const firstVariant = prod.variants[0];
                    if (firstVariant) {
                        let variantName = '';
                        if (firstVariant.size_label) variantName += `${firstVariant.size_label} `;
                        // if (firstVariant.pose) variantName += `${firstVariant.pose} `;
                        // if (firstVariant.color) variantName += `${firstVariant.color}`;
                        if (!variantName) variantName = firstVariant.sku;

                        itemToAdd = {
                            id: firstVariant.sku,
                            sku: firstVariant.sku,
                            name_th: `${prod.name_th || prod.name} (${variantName.trim()})`,
                            name_en: `${prod.name_en || prod.name} (${variantName.trim()})`,
                            price: firstVariant.price,
                            quantity: 1,
                            isPackage: false,
                            isPackageL: false
                        };
                    }
                }
            } else {
                itemToAdd = {
                    id: prod.id,
                    sku: prod.sku,
                    name_th: prod.name_th || prod.name,
                    name_en: prod.name_en || prod.name,
                    price: prod.base_price || prod.price || 0,
                    quantity: 1,
                    isPackage: false,
                    isPackageL: false
                };
            }
        }

        if (!itemToAdd) {
            showToast('Error adding to cart', 'error');
            return;
        }

        const existing = cart.find(item => item.id === itemToAdd.id);
        if (existing) {
            existing.quantity++;
            if (itemToAdd.isPackage) {
                existing.bonus_type = itemToAdd.bonus_type;
                existing.bonus_value = itemToAdd.bonus_value;
                existing.discount_percent = itemToAdd.discount_percent;
                existing.isPackageL = itemToAdd.isPackageL;
            }
        } else {
            cart.push(itemToAdd);
        }

        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
        showToast(`Added to cart: ${itemToAdd.name}`);
    };

    function getCardItemTemplate(item, hasPackageL) {

        const safeItemId = escapeHtml(item.id).replace(/'/g, "\\'");

            (item.sku && (item.sku.toLowerCase() === 'package-l' || item.sku.toLowerCase() === 'l')) ||
            (name && name.toLowerCase().includes('package l')));

        let priceBlock = '';

            priceBlock = `<div>
                        <span style="text-decoration: line-through; color: #999; font-size: 0.8rem;">${(item.price * item.quantity).toLocaleString()} THB</span>

        } else {

        }

        return `<div style="flex: 1;">
                    <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 6px;">
                        <span style="background: #d9f0f2; color: #007883; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">${escapeHtml(item.sku)}</span>
                        <span style="font-weight: 600; color: #1e293b; font-size: 0.95rem;">${escapeHtml(name)}</span>
                        ${packageLBadge}
                    </div>
                    ${priceBlock}
                </div>
                <div style="display: flex; align-items: center; gap: 12px; background: #f1f5f9; padding: 6px 14px; border-radius: 40px;">
                    <button onclick="updateQuantity('${safeItemId}', -1)"
                            style="background: white; border: 1px solid #007883; color: #007883; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; font-weight: bold;">−</button>
                    <span style="min-width: 28px; text-align: center; font-weight: 700; font-size: 1rem;">${item.quantity}</span>
                    <button onclick="updateQuantity('${safeItemId}', 1)"
                            style="background: white; border: 1px solid #007883; color: #007883; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; font-weight: bold;">+</button>
                </div>`;
    }

    function renderCardItem(item, hasPackageL) {

            element.style.alignItems = 'center';
            element.style.padding = '14px 0';
            element.style.borderBottom = '1px solid #e9eef2';
            element.style.gap = '12px;';

            return element;
        }

        // десктопная корзина
        if (item.cartNode && item.cartNode.isConnected) {
            item.cartNode.innerHTML = template;
        } else {
            const node = getWrap();
            node.innerHTML = template
            const cartScrollContainer = document.getElementById('cart-items-list');

            cartScrollContainer.appendChild(node);
            item.cartNode = node;

        // мобильная корзина
        if (item.mobileNode && item.mobileNode.isConnected) {
            item.mobileNode.innerHTML = template;
        } else {
            const node = getWrap();
            node.innerHTML = template
            const mobileScrollContainer = document.getElementById('mobile-cart-items');

            mobileScrollContainer.appendChild(node);
            item.mobileNode = node;
        }
    }

    function updateCartUI() {

        let hasPackageL = false;

                packagesTotal += itemTotal;
                if (item.isPackageL === true) {
                    hasPackageL = true;
                } else {

    // ===================== ФУНКЦИЯ ПРОВЕРКИ ВСЕХ ПОЛЕЙ АНКЕТЫ =====================

    window.checkFormAndCheckout = function () {

        console.log('=== CHECK FORM START ===');
        console.log('Is mobile:', isMobile);

        // Все обязательные поля анкеты
        const fields = {
            clientName: {
                element: document.getElementById(isMobile ? 'mobile-clientName' : 'clientName'),
                label: 'Full Name',
                value: null,
                validation: 'english' // только английские буквы
            },
            clientPhone: {
                element: document.getElementById(isMobile ? 'mobile-clientPhone' : 'clientPhone'),
                label: 'Phone Number',
                value: null,
                validation: 'phone' // телефон
            },
            clientLine: {
                element: document.getElementById(isMobile ? 'mobile-clientLine' : 'clientLine'),
                label: 'Line ID',
                value: null,
                validation: 'english_numbers' // английские буквы и цифры
            },
            studentFirstName: {
                element: document.getElementById(isMobile ? 'mobile-studentFirstName' : 'studentFirstName'),
                label: 'Student First Name',
                value: null,
                validation: 'english'
            },
            studentLastName: {
                element: document.getElementById(isMobile ? 'mobile-studentLastName' : 'studentLastName'),
                label: 'Student Family Name',
                value: null,
                validation: 'english'
            },
            birthdate: {
                element: document.getElementById(isMobile ? 'mobile-birthdate' : 'birthdate'),
                label: 'Birthdate (DD/MM/YYYY)',
                value: null,
                validation: 'date'
            },
            classGrade: {
                element: document.getElementById(isMobile ? 'mobile-classGrade' : 'classGrade'),
                label: 'Class/Grade',
                value: null,
                validation: 'class'
            }
        };

        // Сначала получаем все значения
        for (const [key, field] of Object.entries(fields)) {
            if (field.element) {
                field.value = field.element.value?.trim() || '';
                console.log(`${key}: "${field.value}"`);
            } else {
                console.warn(`${key} element not found`);
            }
        }

        // Проверяем заполненность и валидность
        let hasErrors = false;
        const errorMessages = [];
        const datePattern = /^(\d{2})\/(\d{2})\/(\d{4})$/;

        for (const [key, field] of Object.entries(fields)) {
            if (!field.element) continue;

            const value = field.value;

            // Проверяем что поле не пустое
            if (value === '') {
                hasErrors = true;
                errorMessages.push(`${field.label} is required`);
                field.element.style.border = '2px solid #c44536';
                field.element.style.backgroundColor = '#fff8f8';

                const removeHighlight = () => {
                    if (field.element) {
                        field.element.style.border = '';
                        field.element.style.backgroundColor = '';
                        field.element.removeEventListener('input', removeHighlight);
                        field.element.removeEventListener('change', removeHighlight);
                    }
                };
                field.element.addEventListener('input', removeHighlight, {once: true});
                field.element.addEventListener('change', removeHighlight, {once: true});
                continue;
            }

            // Валидация по типу поля
            switch (field.validation) {
                case 'english':
                    // Только английские буквы, пробелы, дефисы, апострофы
                    if (!/^[A-Za-z\s\-']+$/.test(value)) {
                        hasErrors = true;
                        errorMessages.push(`${field.label}: Use English letters only`);
                        field.element.style.border = '2px solid #c44536';
                        field.element.style.backgroundColor = '#fff8f8';

                        const removeHighlight = () => {
                            if (field.element) {
                                field.element.style.border = '';
                                field.element.style.backgroundColor = '';
                                field.element.removeEventListener('input', removeHighlight);
                                field.element.removeEventListener('change', removeHighlight);
                            }
                        };
                        field.element.addEventListener('input', removeHighlight, {once: true});
                        field.element.addEventListener('change', removeHighlight, {once: true});
                    } else {
                        field.element.style.border = '2px solid var(--border-color)';
                        field.element.style.backgroundColor = 'white';
                    }
                    break;

                case 'english_numbers':
                    // Английские буквы, цифры, пробелы, дефисы, подчеркивания
                    if (!/^[A-Za-z0-9\s\-_]+$/.test(value)) {
                        hasErrors = true;
                        errorMessages.push(`${field.label}: Use English letters and numbers only`);
                        field.element.style.border = '2px solid #c44536';
                        field.element.style.backgroundColor = '#fff8f8';

                        const removeHighlight = () => {
                            if (field.element) {
                                field.element.style.border = '';
                                field.element.style.backgroundColor = '';
                                field.element.removeEventListener('input', removeHighlight);
                                field.element.removeEventListener('change', removeHighlight);
                            }
                        };
                        field.element.addEventListener('input', removeHighlight, {once: true});
                        field.element.addEventListener('change', removeHighlight, {once: true});
                    } else {
                        field.element.style.border = '2px solid var(--border-color)';
                        field.element.style.backgroundColor = 'white';
                    }
                    break;

                case 'phone':
                    // Телефон: цифры, пробелы, дефисы, плюс, скобки
                    if (!/^[0-9\s\-+()]+$/.test(value)) {
                        hasErrors = true;
                        errorMessages.push(`${field.label}: Use only numbers and + - ( )`);
                        field.element.style.border = '2px solid #c44536';
                        field.element.style.backgroundColor = '#fff8f8';

                        const removeHighlight = () => {
                            if (field.element) {
                                field.element.style.border = '';
                                field.element.style.backgroundColor = '';
                                field.element.removeEventListener('input', removeHighlight);
                                field.element.removeEventListener('change', removeHighlight);
                            }
                        };
                        field.element.addEventListener('input', removeHighlight, {once: true});
                        field.element.addEventListener('change', removeHighlight, {once: true});
                    } else {
                        field.element.style.border = '2px solid var(--border-color)';
                        field.element.style.backgroundColor = 'white';
                    }
                    break;

                case 'date':
                    // Проверяем формат даты DD/MM/YYYY
                    if (!datePattern.test(value)) {
                        hasErrors = true;
                        errorMessages.push(`${field.label}: Use DD/MM/YYYY format`);
                        field.element.style.border = '2px solid #c44536';
                        field.element.style.backgroundColor = '#fff8f8';

                        const removeHighlight = () => {
                            if (field.element) {
                                field.element.style.border = '';
                                field.element.style.backgroundColor = '';
                                field.element.removeEventListener('input', removeHighlight);
                                field.element.removeEventListener('change', removeHighlight);
                            }
                        };
                        field.element.addEventListener('input', removeHighlight, {once: true});
                        field.element.addEventListener('change', removeHighlight, {once: true});
                    } else {
                        const match = datePattern.exec(value);
                        const day = parseInt(match[1], 10);
                        const month = parseInt(match[2], 10);
                        const year = parseInt(match[3], 10);

                        const date = new Date(year, month - 1, day);
                        const isValidDate = date.getFullYear() === year &&
                            date.getMonth() === month - 1 &&
                            date.getDate() === day;

                        if (!isValidDate || year < 1900 || year > new Date().getFullYear()) {
                            hasErrors = true;
                            errorMessages.push(`${field.label}: Invalid date`);
                            field.element.style.border = '2px solid #c44536';
                            field.element.style.backgroundColor = '#fff8f8';

                            const removeHighlight = () => {
                                if (field.element) {
                                    field.element.style.border = '';
                                    field.element.style.backgroundColor = '';
                                    field.element.removeEventListener('input', removeHighlight);
                                    field.element.removeEventListener('change', removeHighlight);
                                }
                            };
                            field.element.addEventListener('input', removeHighlight, {once: true});
                            field.element.addEventListener('change', removeHighlight, {once: true});
                        } else {
                            field.element.style.border = '2px solid var(--border-color)';
                            field.element.style.backgroundColor = 'white';
                        }
                    }
                    break;

                case 'class':
                    // Класс: число от 1 до 11
                    const classNum = parseInt(value, 10);
                    if (isNaN(classNum) || classNum < 1 || classNum > 11 || classNum.toString() !== value) {
                        hasErrors = true;
                        errorMessages.push(`${field.label}: Must be a number between 1 and 11`);
                        field.element.style.border = '2px solid #c44536';
                        field.element.style.backgroundColor = '#fff8f8';

                        const removeHighlight = () => {
                            if (field.element) {
                                field.element.style.border = '';
                                field.element.style.backgroundColor = '';
                                field.element.removeEventListener('input', removeHighlight);
                                field.element.removeEventListener('change', removeHighlight);
                            }
                        };
                        field.element.addEventListener('input', removeHighlight, {once: true});
                        field.element.addEventListener('change', removeHighlight, {once: true});
                    } else {
                        field.element.style.border = '2px solid var(--border-color)';
                        field.element.style.backgroundColor = 'white';
                    }
                    break;
            }
        }

        console.log('Has errors:', hasErrors);
        console.log('Error messages:', errorMessages);

        // Если есть ошибки
        if (hasErrors) {
            closeMobileCart();

            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });

            const formContainer = isMobile ? document.querySelector('.mobile-form') : document.querySelector('.desktop-form');

            if (formContainer) {
                const originalBoxShadow = formContainer.style.boxShadow;
                const originalTransition = formContainer.style.transition;
                formContainer.style.transition = 'box-shadow 0.3s';
                formContainer.style.boxShadow = '0 0 0 3px #c44536';
                setTimeout(() => {
                    formContainer.style.boxShadow = originalBoxShadow || '';
                    formContainer.style.transition = originalTransition || '';
                }, 2000);
            }

            // Находим первое поле с ошибкой
            for (const [key, field] of Object.entries(fields)) {
                if (!field.element) continue;

                const value = field.value;

                if (value === '' && field.element) {
                    setTimeout(() => {
                        field.element.focus();
                        field.element.scrollIntoView({behavior: 'smooth', block: 'center'});
                    }, 500);
                    break;
                } else if (key === 'birthdate' && value && field.element) {
                    if (!datePattern.test(value)) {
                        setTimeout(() => {
                            field.element.focus();
                            field.element.scrollIntoView({behavior: 'smooth', block: 'center'});
                        }, 500);
                        break;
                    }
                } else if (field.element && field.element.style.border === '2px solid #c44536') {
                    setTimeout(() => {
                        field.element.focus();
                        field.element.scrollIntoView({behavior: 'smooth', block: 'center'});
                    }, 500);
                    break;
                }
            }

            // Показываем первое сообщение об ошибке
            showToast(errorMessages[0], 'error');

            return;
        }

        // Если все поля заполнены и валидны, отправляем заказ
        console.log('All fields are valid, sending to CRM...');
        sendToCRM();
    };

    // Вспомогательная функция для защиты от XSS
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function (m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ===================== АВТОМАТИЧЕСКОЕ ФОРМАТИРОВАНИЕ ДАТЫ (ДОБАВИТЬ ПОСЛЕ initSupabase) =====================
    function setupDateFields() {
        // Десктопное поле
        const desktopDate = document.getElementById('birthdate');
        const desktopWrapper = desktopDate ? desktopDate.closest('.date-input-wrapper') : null;

        if (desktopDate) {
            // Функция обновления состояния плейсхолдера
            const updateDesktopPlaceholder = () => {
                if (desktopWrapper) {
                    if (desktopDate.value.trim() !== '') {
                        desktopWrapper.classList.add('filled');
                    } else {
                        desktopWrapper.classList.remove('filled');
                    }
                }
            };

            desktopDate.addEventListener('input', function (e) {
                // Убираем все не-цифры
                let value = this.value.replace(/\D/g, '');

                // Ограничиваем 8 цифрами
                if (value.length > 8) {
                    value = value.slice(0, 8);
                }

                // Форматируем с автоматическими слешами
                let formatted = '';
                if (value.length > 0) {
                    formatted = value.slice(0, 2);
                    if (value.length >= 3) {
                        formatted += '/' + value.slice(2, 4);
                    }
                    if (value.length >= 5) {
                        formatted += '/' + value.slice(4, 8);
                    }
                }

                this.value = formatted;
                updateDesktopPlaceholder();

                // Логируем для отладки
                console.log('Desktop birthdate formatted:', formatted);
            });

            desktopDate.addEventListener('blur', updateDesktopPlaceholder);
            desktopDate.placeholder = 'DD/MM/YYYY';
            updateDesktopPlaceholder();

            // Логируем начальное значение

                    } else {
                        mobileWrapper.classList.remove('filled');
                    }
                }
            };

            mobileDate.addEventListener('input', function (e) {
                let value = this.value.replace(/\D/g, '');

                if (value.length > 8) {
                    value = value.slice(0, 8);
                }

                let formatted = '';
                if (value.length > 0) {

                console.log('Mobile birthdate formatted:', formatted);
            });

            mobileDate.addEventListener('blur', updateMobilePlaceholder);
            mobileDate.placeholder = 'DD/MM/YYYY';

        return /^[0-9\s\-+()]*$/.test(value);
    }

    function validateClass(value) {
        if (!value) return true;
        const classNum = parseInt(value, 10);
        return !isNaN(classNum) && classNum >= 1 && classNum <= 11;
    }

    // ===================== ОГРАНИЧЕНИЯ ПРИ ВВОДЕ =====================
    function setupInputRestrictions() {

        // Текстовые поля - только английские буквы
        const textFields = [
            {id: isMobile ? 'mobile-clientName' : 'clientName'},
            {id: isMobile ? 'mobile-studentFirstName' : 'studentFirstName'},
            {id: isMobile ? 'mobile-studentLastName' : 'studentLastName'},
            {id: isMobile ? 'mobile-clientLine' : 'clientLine'}
        ];

        textFields.forEach(({id}) => {
            const element = document.getElementById(id);
            if (element) {
                element.addEventListener('input', function (e) {
                    let value = this.value;
                    // Удаляем все, что не английские буквы, пробелы, дефисы, апострофы
                    let filtered = value.replace(/[^A-Za-z\s\-']/g, '');
                    if (filtered !== value) {
                        this.value = filtered;
                        showToast('Use English letters only', 'error');
                    }
                });
            }
        });

        // Поле телефона - только цифры и разрешенные символы
        const phoneField = document.getElementById(isMobile ? 'mobile-clientPhone' : 'clientPhone');
        if (phoneField) {
            phoneField.addEventListener('input', function (e) {
                let value = this.value;
                let filtered = value.replace(/[^0-9\s\-+()]/g, '');
                if (filtered !== value) {
                    this.value = filtered;
                }
            });
        }

        // Поле класса - только цифры от 1 до 11
        const classField = document.getElementById(isMobile ? 'mobile-classGrade' : 'classGrade');
        if (classField) {
            classField.addEventListener('input', function (e) {
                let value = this.value;
                // Удаляем все не-цифры
                let filtered = value.replace(/[^0-9]/g, '');

                // Ограничиваем длину до 2 символов (макс 11)
                if (filtered.length > 2) {
                    filtered = filtered.slice(0, 2);
                }

                // Проверяем диапазон
                if (filtered && (parseInt(filtered) < 1 || parseInt(filtered) > 11)) {
                    if (filtered.length === 2 && parseInt(filtered) > 11) {
                        filtered = filtered.slice(0, 1);
                    }
                }

                if (filtered !== value) {
                    this.value = filtered;
                }

                // Дополнительная проверка при вводе
                if (filtered && (parseInt(filtered) < 1 || parseInt(filtered) > 11)) {
                    this.style.border = '2px solid #c44536';
                    this.style.backgroundColor = '#fff8f8';
                } else {
                    this.style.border = '2px solid var(--border-color)';
                    this.style.backgroundColor = 'white';
                }
            });

            classField.addEventListener('blur', function () {
                let value = this.value;
                if (value) {
                    const num = parseInt(value, 10);
                    if (num < 1 || num > 11) {
                        this.value = '';
                        showToast('Class must be between 1 and 11', 'error');
                        this.style.border = '2px solid #c44536';
                        this.style.backgroundColor = '#fff8f8';
                    }
                }
            });
        }
    }

    function addFormHint() {

        const formContainer = isMobile ? document.querySelector('.mobile-form') : document.querySelector('.desktop-form');

        if (formContainer && !formContainer.querySelector('.form-footer-hint')) {
